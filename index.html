<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 강의 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 페이지 1: 로그인 */
        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }
        .btn-google {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 페이지 2: 과목 목록 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e4e8;
        }
        .subject-card {
            background: white;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .progress-text { color: #888; font-size: 14px; font-weight: normal; }

        /* 페이지 3: 강의 체크 다단 그리드 */
        .back-btn {
            background: #e1e4e8;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .lecture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
        }
        .lecture-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 0;
            text-align: center;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
        }
        .lecture-box.checked {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="page active">
        <div class="login-wrapper">
            <h2 style="margin-bottom: 30px;">강의 진도 체크</h2>
            <button class="btn-google" id="login-btn">Google 계정으로 시작하기</button>
        </div>
    </div>

    <div id="page-subjects" class="page">
        <div class="header">
            <h2 id="user-greeting" style="margin: 0;">내 강의실</h2>
            <button id="logout-btn" style="border:none; background:transparent; color:#888; cursor:pointer;">로그아웃</button>
        </div>
        <div id="subject-list"></div>
    </div>

    <div id="page-lectures" class="page">
        <button class="back-btn" id="back-btn">⬅ 과목 목록으로</button>
        <h3 id="current-subject-title" style="margin-bottom: 20px;">과목명</h3>
        <div class="lecture-grid" id="lecture-grid"></div>
    </div>
</div>

<script type="module">
    // 안정적인 10.9.0 버전으로 모듈 일괄 로드
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // 🔴 새로 발급받으신 프로젝트 설정 완벽 적용
    const firebaseConfig = {
        apiKey: "AIzaSyACDKJoKYR8nusUBeqUtm1kFCHtDJwZLFc",
        authDomain: "lectures-app-v.firebaseapp.com",
        projectId: "lectures-app-v",
        storageBucket: "lectures-app-v.firebasestorage.app",
        messagingSenderId: "123338839470",
        appId: "1:123338839470:web:34cf25d139c7bb71e3e43f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const courseData = {
        "환경공학 이론완성 (수질)": 75,
        "환경공학 이론완성 (대기)": 41,
        "환경공학 이론완성 (소음진동 및 폐기물)": 33,
        "화학 이론완성": 39,
        "배수진 화학 기초완성": 36
    };

    let currentUser = null;
    let currentSelectedSubject = "";
    let userProgressData = {};

    const subjectListEl = document.getElementById('subject-list');
    const lectureGridEl = document.getElementById('lecture-grid');
    const subjectTitleEl = document.getElementById('current-subject-title');

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await fetchUserData();
            renderSubjects();
            showPage('page-subjects');
        } else {
            currentUser = null;
            showPage('page-login');
        }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert("로그인 실패: " + err.message));
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    document.getElementById('back-btn').addEventListener('click', () => {
        renderSubjects();
        showPage('page-subjects');
    });

    async function fetchUserData() {
        const docSnap = await getDoc(doc(db, "users", currentUser.uid));
        userProgressData = docSnap.exists() ? docSnap.data() : {};
    }

    function renderSubjects() {
        subjectListEl.innerHTML = '';
        for (const [subjectName, totalLectures] of Object.entries(courseData)) {
            const completedCount = Object.values(userProgressData[subjectName] || {}).filter(v => v === true).length;
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `<span>${subjectName}</span><span class="progress-text">${completedCount} / ${totalLectures}강</span>`;
            card.onclick = () => openLecturePage(subjectName, totalLectures);
            subjectListEl.appendChild(card);
        }
    }

    function openLecturePage(subjectName, totalLectures) {
        currentSelectedSubject = subjectName;
        subjectTitleEl.textContent = subjectName;
        lectureGridEl.innerHTML = '';

        const subjectProgress = userProgressData[subjectName] || {};
        for (let i = 1; i <= totalLectures; i++) {
            const box = document.createElement('div');
            box.className = 'lecture-box';
            if (subjectProgress[i]) box.classList.add('checked');
            box.textContent = `${i}강`;
            box.onclick = () => toggleLecture(i, box);
            lectureGridEl.appendChild(box);
        }
        showPage('page-lectures');
    }

    async function toggleLecture(lectureNum, boxElement) {
        const isChecked = boxElement.classList.toggle('checked');
        if (!userProgressData[currentSelectedSubject]) userProgressData[currentSelectedSubject] = {};
        userProgressData[currentSelectedSubject][lectureNum] = isChecked;
        
        try {
            await setDoc(doc(db, "users", currentUser.uid), userProgressData);
        } catch (error) {
            console.error("저장 실패 (규칙 설정 확인 필요):", error);
        }
    }
</script>
</body>
</html>
